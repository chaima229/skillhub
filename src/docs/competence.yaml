paths:
  /api/v1/competences:
    get:
      tags: [Competence]
      summary: Liste des compétences
      responses:
        "200":
          description: Liste des compétences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competence"
    post:
      tags: [Competence]
      summary: Créer une compétence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetenceCreate"
      responses:
        "201":
          description: Compétence créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competence"
  /api/v1/competences/{id}:
    get:
      tags: [Competence]
      summary: Récupérer une compétence par ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Compétence trouvée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competence"
        "404":
          description: Compétence non trouvée
    patch:
      tags: [Competence]
      summary: Modifier une compétence
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetenceUpdate"
      responses:
        "200":
          description: Compétence modifiée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competence"
    delete:
      tags: [Competence]
      summary: Supprimer une compétence
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Compétence supprimée

components:
  schemas:
    Competence:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        level: { type: string }
    CompetenceCreate:
      type: object
      required: [name, level]
      properties:
        name: { type: string }
        level: { type: string }
    CompetenceUpdate:
      type: object
      properties:
        name: { type: string }
        level: { type: string }
